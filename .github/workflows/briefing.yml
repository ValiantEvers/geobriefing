name: Daily Geopolitical Briefing

on:
  schedule:
    # Runs every day at 05:00 UTC (07:00 Oslo time in summer, 06:00 in winter)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run collector
        run: python collect.py

      - name: Commit and push briefing.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefing.json
          git diff --staged --quiet || git commit -m "Update briefing $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
